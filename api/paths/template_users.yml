paths:
  templateUsers:
    x-ogen-operation-group: TemplateUsers
    get:
      operationId: templateUsers
      summary: Получить список пользователей с доступом к шаблону
      parameters:
        - $ref: "../common.yml#/components/parameters/UserID"
        - $ref: "#/components/parameters/TemplateID"
      responses:
        200:
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateUsersResponse"
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "../common.yml#/components/schemas/Error"

components:
  parameters:
    TemplateID:
      name: templateID
      description: ID шаблона
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    TemplateUsersResponse:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          description: Список пользователей шаблона
          items:
            type: object
            description: Пользователь шаблона
            required:
              - id
              - name
              - email
              - role
            properties:
              id:
                type: integer
                format: int64
                description: ID пользователя
              name:
                type: string
                description: Имя пользователя
              email:
                type: string
                description: Электронный адрес пользователя
              role:
                type: string
                description: Роль пользователя в шаблоне
                enum:
                  - read
                  - write
