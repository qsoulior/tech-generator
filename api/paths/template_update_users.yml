paths:
  templateUpdateUsers:
    x-ogen-operation-group: TemplateUpdateUsers
    post:
      operationId: templateUpdateUsers
      summary: Обновить список пользователей шаблона
      parameters:
        - $ref: "../common.yml#/components/parameters/UserID"
        - $ref: "#/components/parameters/TemplateID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateUpdateUsersRequest"
      responses:
        204:
          description: No content
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "../common.yml#/components/schemas/Error"

components:
  parameters:
    TemplateID:
      name: templateID
      description: ID шаблона
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    TemplateUpdateUsersRequest:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          description: Список пользователей шаблона
          items:
            type: object
            description: Пользователь шаблона
            required:
              - id
              - role
            properties:
              id:
                type: integer
                format: int64
                description: ID пользователя
              role:
                type: string
                description: Роль пользователя в шаблоне
                enum:
                  - read
                  - write
