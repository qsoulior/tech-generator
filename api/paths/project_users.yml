paths:
  projectUsers:
    x-ogen-operation-group: ProjectUsers
    get:
      operationId: projectUsers
      summary: Получить список пользователей с доступом к проекту
      parameters:
        - $ref: "../common.yml#/components/parameters/UserID"
        - $ref: "#/components/parameters/ProjectID"
      responses:
        200:
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectUsersResponse"
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "../common.yml#/components/schemas/Error"

components:
  parameters:
    ProjectID:
      name: projectID
      description: ID проекта
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    ProjectUsersResponse:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          description: Список пользователей проекта
          items:
            type: object
            description: Пользователь проекта
            required:
              - id
              - name
              - email
              - role
            properties:
              id:
                type: integer
                format: int64
                description: ID пользователя
              name:
                type: string
                description: Имя пользователя
              email:
                type: string
                description: Электронный адрес пользователя
              role:
                type: string
                description: Роль пользователя в проекте
                enum:
                  - read
                  - write
                  - maintain
