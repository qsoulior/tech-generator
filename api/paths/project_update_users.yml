paths:
  projectUpdateUsers:
    x-ogen-operation-group: ProjectUpdateUsers
    post:
      operationId: projectUpdateUsers
      summary: Обновить список пользователей проекта
      parameters:
        - $ref: "../common.yml#/components/parameters/UserID"
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdateUsersRequest"
      responses:
        204:
          description: No content
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "../common.yml#/components/schemas/Error"

components:
  parameters:
    ProjectID:
      name: projectID
      description: ID проекта
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    ProjectUpdateUsersRequest:
      type: object
      required:
        - users
      properties:
        users:
          type: array
          description: Список пользователей проекта
          items:
            type: object
            description: Пользователь проекта
            required:
              - id
              - role
            properties:
              id:
                type: integer
                format: int64
                description: ID пользователя
              role:
                type: string
                description: Роль пользователя в проекте
                enum:
                  - read
                  - write
                  - maintain
