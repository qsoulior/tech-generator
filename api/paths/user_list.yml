paths:
  userList:
    x-ogen-operation-group: UserList
    get:
      operationId: userList
      summary: Получить список пользователей
      parameters:
        - $ref: "../common.yml#/components/parameters/UserID"
        - $ref: "../common.yml#/components/parameters/Page"
        - $ref: "../common.yml#/components/parameters/Size"
        - $ref: "#/components/parameters/UserName"
      responses:
        200:
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "../common.yml#/components/schemas/Error"

components:
  parameters:
    UserName:
      name: userName
      description: Имя пользователя
      in: query
      required: false
      schema:
        type: string

  schemas:
    UserListResponse:
      type: object
      required:
        - users
        - totalUsers
        - totalPages
      properties:
        users:
          type: array
          description: Список пользователей
          items:
            type: object
            description: Пользователь
            required:
              - id
              - name
              - email
            properties:
              id:
                type: integer
                format: int64
                description: ID пользователя
              name:
                type: string
                description: Имя пользователя
              email:
                type: string
                description: Электронный адрес пользователя
        totalUsers:
          type: integer
          format: int64
          description: Общее количество пользователей
        totalPages:
          type: integer
          format: int64
          description: Общее количество страниц
