paths:
  taskGetByID:
    x-ogen-operation-group: TaskGetByID
    get:
      operationId: taskGetByID
      summary: Получить задачу генерации по ID
      parameters:
        - $ref: "../common.yml#/components/parameters/UserID"
        - $ref: "#/components/parameters/TaskID"
      responses:
        200:
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskGetByIDResponse"
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "../common.yml#/components/schemas/Error"

components:
  parameters:
    TaskID:
      name: taskID
      description: ID задачи
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    TaskGetByIDResponse:
      type: object
      required:
        - task
      properties:
        task:
          type: object
          required:
            - id
            - versionID
            - status
            - payload
            - creatorName
            - createdAt
          properties:
            id:
              type: integer
              format: int64
              description: ID задачи
            versionID:
              type: integer
              format: int64
              description: ID версии
            status:
              $ref: "../common.yml#/components/schemas/TaskStatus"
            payload:
              type: object
              description: Пэйлоад задачи
              additionalProperties:
                type: string
            error:
              type: object
              description: Ошибка обработки задачи
              properties:
                message:
                  type: string
                  description: Сообщение ошибки
                template:
                  type: object
                  description: Локализация ошибки внутри текста шаблона
                  required:
                    - line
                  properties:
                    line:
                      type: integer
                      description: Номер строки в шаблоне (начиная с 1)
                    column:
                      type: integer
                      description: Номер столбца в шаблоне (начиная с 1); отсутствует, если неизвестен
                    snippet:
                      type: string
                      description: Содержимое строки шаблона, на которой произошла ошибка
                    detail:
                      type: string
                      description: Подробное диагностическое сообщение из движка шаблонов
                variableErrors:
                  type: array
                  items:
                    type: object
                    description: Ошибка обработки переменных
                    required:
                      - id
                      - name
                      - title
                    properties:
                      id:
                        type: integer
                        format: int64
                        description: ID переменной
                      name:
                        type: string
                        description: Слаг переменной
                      title:
                        type: string
                        description: Человекочитаемое название переменной
                      value:
                        type: string
                        description: Вычисленное значение переменной, на котором сработала проверка ограничений
                      message:
                        type: string
                        description: Сообщение ошибки
                      constraintErrors:
                        type: array
                        items:
                          type: object
                          description: Ошибка обработки ограничений
                          required:
                            - id
                            - name
                            - expression
                          properties:
                            id:
                              type: integer
                              format: int64
                              description: ID ограничения
                            name:
                              type: string
                              description: Название ограничения
                            expression:
                              type: string
                              description: Выражение ограничения
                            message:
                              type: string
                              description: Сообщение ошибки
            creatorName:
              type: string
              description: Имя создателя задачи
            createdAt:
              type: string
              format: date-time
              description: Дата и время создания задачи
            updatedAt:
              type: string
              format: date-time
              description: Дата и время обновления задачи
        result:
          type: string
          format: byte
