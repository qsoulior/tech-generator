services:
  db:
    image: postgres:17.6-alpine3.22
    restart: unless-stopped
    volumes:
      - ./migrations/postgres:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 20s
      start_period: 10s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2-management
    restart: unless-stopped
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    healthcheck:
      test: rabbitmq-diagnostics -q status
      interval: 10s
      timeout: 30s
      retries: 5

  service:
    build:
      context: .
      dockerfile: Dockerfile.service
    image: tech-generator-service
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SERVICE_HOST: 0.0.0.0
      SERVICE_PORT: "3000"
      SERVICE_ALLOWED_ORIGINS: ${SERVICE_ALLOWED_ORIGINS:?SERVICE_ALLOWED_ORIGINS is required}
      USER_TOKEN_EXPIRATION: ${USER_TOKEN_EXPIRATION:-720h}
      ED25519_PRIVATE_KEY_PATH: /run/secrets/ed25519/ed25519_private.pem
      ED25519_PUBLIC_KEY_PATH: /run/secrets/ed25519/ed25519_public.pem
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    volumes:
      - ./keys:/run/secrets/ed25519:ro
    ports:
      - "${SERVICE_PUBLISHED_PORT:-3000}:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: tech-generator-worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
