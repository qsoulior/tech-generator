# Root local compose.
#
# Поднимает всё приложение целиком одной командой:
#   docker compose -f docker-compose.local.yml up -d --build
#
# После старта:
#   - Frontend:        http://localhost:5173
#   - Backend API:     http://localhost:3000
#   - Postgres:        localhost:15432   (master / devuser / devpassword)
#   - RabbitMQ AMQP:   localhost:5672    (devuser / devpassword)
#   - RabbitMQ UI:     http://localhost:15672
#
# Никаких env-переменных задавать не нужно — все значения захардкожены в
# backend/docker-compose.local.yml и frontend/docker-compose.local.yml.

name: tech-generator

include:
  - backend/docker-compose.local.yml
  - frontend/docker-compose.local.yml
